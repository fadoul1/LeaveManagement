name: Trigger auto deployment for leavemanagement-api

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ master ]
    paths:
    - '**'
    - '.github/workflows/leavemanagement-api-AutoDeployTrigger-b5ddd368-47c2-4f20-adc1-c639fd43b5a0.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.LEAVEMANAGEMENTAPI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.LEAVEMANAGEMENTAPI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.LEAVEMANAGEMENTAPI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: leavemanagementacrus4r55oy7xxwa.azurecr.io
          registryUsername: ${{ secrets.LEAVEMANAGEMENTAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.LEAVEMANAGEMENTAPI_REGISTRY_PASSWORD }}
          containerAppName: leavemanagement-api
          resourceGroup: rg-leavemanagement
          imageToBuild: leavemanagementacrus4r55oy7xxwa.azurecr.io/leavemanagement-api:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


