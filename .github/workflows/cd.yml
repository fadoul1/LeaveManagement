name: CD - Deploy to Azure

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

env:
  ACR_LOGIN_SERVER: ${{ vars.AZURE_CONTAINER_REGISTRY }}
  IMAGE_NAME: leavemanagement-api

jobs:
  ci-check:
    name: CI Quality Gate
    uses: ./.github/workflows/ci.yml

  build-and-push-staging:
    name: Build & Push Staging Image
    runs-on: ubuntu-latest
    needs: ci-check
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push staging image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:staging
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Wait for continuous deployment propagation
        run: |
          echo "Waiting for Container App to detect the new image via ACR webhook..."
          sleep 60

      - name: Smoke test staging
        run: |
          STAGING_URL="${{ vars.STAGING_APP_URL }}"
          echo "Running smoke test against $STAGING_URL"
          for i in $(seq 1 15); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_URL/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS - retrying in 15s..."
            sleep 15
          done
          echo "Smoke test failed after 15 attempts"
          exit 1

  promote-to-production:
    name: Promote to Production
    runs-on: ubuntu-latest
    needs: build-and-push-staging
    if: github.ref == 'refs/heads/master' && (github.event_name != 'workflow_dispatch' || github.event.inputs.environment == 'production')
    environment: production

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Promote staging image to production
        run: |
          docker buildx imagetools create \
            --tag ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:production \
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:staging
          echo "Image promoted from staging to production tag"
